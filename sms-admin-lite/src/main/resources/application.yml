# 公共配置文件。
# 这里只保留各环境都通用的配置项；
# 数据库、Redis、日志路径等环境差异项分别放到 application-local.yml / application-prod.yml。

server:
  # 服务端口。
  port: 8080

spring:
  application:
    # 应用名主要用于日志、监控、服务识别。
    name: sms-admin-lite

  jackson:
    # 让 LocalDateTime 返回得更直观一些，方便你调试接口。
    time-zone: Asia/Shanghai

# ── MyBatis ──────────────────────────────────────────────
mybatis:
  # 告诉 MyBatis 去哪里找 SQL 映射文件（*.xml）。
  mapper-locations: classpath:mapper/*.xml
  # 开启驼峰映射：数据库 created_at → Java createdAt，不需要在 XML 里写 resultMap。
  configuration:
    map-underscore-to-camel-case: true
    # 让 SQL 日志走 SLF4J，统一接入 logback，而不是直接往控制台输出。
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    root: info
    com.mtjava.smsadminlite: info
    org.springframework: info
    org.mybatis: info

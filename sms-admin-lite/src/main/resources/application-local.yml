# 本地开发环境配置。
# 启动命令示例：
# mvn -pl sms-admin-lite spring-boot:run -Dspring-boot.run.profiles=local

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mt_java?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      # 学习阶段保留自动建表，方便本地直接启动。
      mode: always

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

logging:
  file:
    path: logs
  level:
    com.mtjava.smsadminlite: debug

app:
  demo-data:
    # 本地环境自动初始化演示用户，便于快速验证接口。
    enabled: true

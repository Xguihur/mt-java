# 这个配置文件相当于前端项目里的环境配置文件。
# 学习阶段先只保留最常用、最容易理解的配置项。

server:
  # 服务端口，启动后访问 http://localhost:8080
  port: 8080

spring:
  application:
    # 应用名主要用于日志、监控、服务识别。
    name: sms-admin-lite

  # ── 数据库连接 ────────────────────────────────────────────
  datasource:
    # 把 your_password 改成你本地 MySQL 的密码；数据库名 mt_java 需要提前创建。
    url: jdbc:mysql://localhost:3306/mt_java?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── 自动建表 ─────────────────────────────────────────────
  sql:
    init:
      # always：每次启动都执行 schema.sql（语句内含 IF NOT EXISTS，幂等安全）。
      mode: always

  # ── Redis ────────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      # 如果 Redis 设置了密码，在这里填写；没有密码就删掉这行。
      # password: your_redis_password
      timeout: 3000ms

  jackson:
    # 让 LocalDateTime 返回得更直观一些，方便你调试接口。
    time-zone: Asia/Shanghai

# ── MyBatis ──────────────────────────────────────────────
mybatis:
  # 告诉 MyBatis 去哪里找 SQL 映射文件（*.xml）。
  mapper-locations: classpath:mapper/*.xml
  # 开启驼峰映射：数据库 created_at → Java createdAt，不需要在 XML 里写 resultMap。
  configuration:
    map-underscore-to-camel-case: true
    # 让 SQL 日志走 SLF4J，统一接入 logback，而不是直接往控制台输出。
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  file:
    path: logs
  level:
    root: info
    com.mtjava.smsadminlite: debug
    org.springframework: info
    org.mybatis: info

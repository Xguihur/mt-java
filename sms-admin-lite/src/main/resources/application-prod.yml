# 生产环境配置。
# 生产环境建议通过环境变量注入敏感信息，启动命令示例：
# java -jar sms-admin-lite-0.0.1-SNAPSHOT.jar --spring.profiles.active=prod

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:mt_java}?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${DB_USERNAME:mt_java_app}
    password: ${DB_PASSWORD:change_me}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      # 当前阶段保留自动建表，后续可升级为 Flyway/Liquibase。
      mode: always

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms

logging:
  file:
    path: ${LOG_PATH:/opt/mt-java/logs}
  level:
    com.mtjava.smsadminlite: info

app:
  demo-data:
    enabled: false
